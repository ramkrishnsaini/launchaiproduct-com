# Deploy static Next.js export to GitHub Pages
#
# Custom domain at ROOT (e.g. https://launchaiproduct.com/):
#   Leave NEXT_PUBLIC_BASE_PATH empty. If assets 404 under /repo/_next/, you were
#   building with a subpath — custom domains are served from /, not /repo-name/.
#
# GitHub.io project URL only (https://user.github.io/repo-name/):
#   Set repo variable NEXT_PUBLIC_BASE_PATH = /repo-name (with leading slash)
#   and NEXT_PUBLIC_SITE_URL = https://user.github.io/repo-name
#
# Configure variables: Settings → Secrets and variables → Actions → Variables
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Empty = assets at https://your-domain.com/_next/... (required for custom domains)
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          # Defaults to launchaiproduct.com via lib/site.ts if unset; override for github.io
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
