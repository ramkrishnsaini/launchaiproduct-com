  <text x="72" y="288" fill="#a1a1aa" font-family="Segoe UI, system-ui, sans-serif" font-size="22">For developers who want a real AI product — not a wrapper.</text>
  <text x="72" y="340" fill="#71717a" font-family="Segoe UI, system-ui, sans-serif" font-size="18">WhatsApp · Strategy calls · launchaiproduct.com</text>
