<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" fill="none">
  <title>LinkedIn banner template — LaunchAIProduct.com</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1584" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030f0f"/>
      <stop offset="0.55" stop-color="#061a18"/>
      <stop offset="1" stop-color="#03624c" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="glow" x1="1200" y1="0" x2="1584" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00df82" stop-opacity="0.15"/>
